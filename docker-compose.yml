services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mangertask-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      DDB_AUTO_CREATE_TABLES: ${DDB_AUTO_CREATE_TABLES:-true}
      TZ: UTC
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mangertask-frontend
    restart: unless-stopped
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://host.docker.internal:3001}
      TZ: UTC
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    stdin_open: true
    tty: true
    depends_on:
      backend:
        condition: service_started
    command: npm run start -- --tunnel --clear